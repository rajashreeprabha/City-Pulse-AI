<!DOCTYPE html>
<html>
<head>
    <title>CityPulse AI</title>
</head>
<body style="font-family: Arial; text-align:center; margin-top:50px">

    <h1>CityPulse AI</h1>
    <h3>Real-Time City Risk Prediction</h3>

    <input id="area" placeholder="Area Name"><br><br>
    <input id="fever" placeholder="Fever Level"><br><br>
    <input id="humidity" placeholder="Humidity"><br><br>
    <input id="rain" placeholder="Rain (0 or 1)"><br><br>
    <input id="aqi" placeholder="AQI"><br><br>

    <button onclick="sendData()">Predict</button>

    <h2 id="result"></h2>

<script>
function sendData(){
    fetch("http://127.0.0.1:5000/predict",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            area: document.getElementById("area").value,
            fever: document.getElementById("fever").value,
            humidity: document.getElementById("humidity").value,
            rain: document.getElementById("rain").value,
            aqi: document.getElementById("aqi").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Prediction Result: " + data.prediction;
    });
}
</script>

</body>
</html>
